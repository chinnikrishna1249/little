/* ===================== RENDER ===================== */
function renderCards(id,items,type,getMeta){
  const el=document.getElementById(id);if(!el)return;
  el.innerHTML=items.map((item,i)=>{
    const m=getMeta(item);
    return `<div class="card clickable" onclick="cardClick(event,'${type}',${i})">
      ${m.icon?`<div class="card-icon">${m.icon}</div>`:""}
      <h3>${m.title}</h3><p>${m.desc}</p>
      ${m.tags?`<div class="card-tags">${m.tags.map(t=>`<span>${t}</span>`).join("")}</div>`:""}
      <div class="click-hint">${m.hint||"View details"}</div>
    </div>`;
  }).join("");
}

function renderSimpleCards(id,items){
  const el=document.getElementById(id);if(!el)return;
  el.innerHTML=items.map(c=>`<div class="card">
    <div class="card-icon">🏫</div>
    <h3>${c.name}</h3>
    <div class="card-tags"><span>${c.rank}</span><span>${c.location}</span></div>
    <p style="margin-top:10px;font-size:13px;color:var(--muted);">${c.note}</p>
  </div>`).join("");
}

function showCollegeType(t){
  document.getElementById('college-ug-section').style.display=t==='ug'?'block':'none';
  document.getElementById('college-pg-section').style.display=t==='pg'?'block':'none';
  document.querySelectorAll('.ctype-btn').forEach((b,i)=>{b.classList.toggle('active',(t==='ug'&&i===0)||(t==='pg'&&i===1));});
}

function initInteractive(){
  renderCards('tech-cards',techData,'tech',d=>({icon:d.icon,title:d.name,desc:d.desc,tags:d.tags,hint:"View curriculum & projects"}));
