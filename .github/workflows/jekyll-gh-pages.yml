  renderCards('roadmap-cards',roadmapData,'roadmap',d=>({title:d.name,desc:`${d.timeline} • ${d.steps.length} milestones.`,hint:"View full roadmap"}));
  renderCards('project-cards',projectData,'project',d=>({title:d.name,desc:`${d.ideas.length} project ideas for your portfolio.`,hint:"View project ideas"}));
