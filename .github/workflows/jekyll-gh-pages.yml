/* ===================== AI CHAT ===================== */
let chatHistory=[];

const SYSTEM_PROMPT=`You are the NextGen Career Counselor — an expert AI mentor for Indian college students planning their IT and Non-IT careers. You have deep knowledge of:
- Career roadmaps for Software Developer, Data Analyst, Cloud Engineer, Full Stack Developer, Data Scientist, Cyber Security Analyst
- Technology learning paths: AI, ML, Data Science, Cloud Computing, Cyber Security, Full Stack Dev, DevOps, SAP, Software Testing, Business Analytics, UI/UX, Blockchain/IoT
- Indian job market: TCS, Infosys, Wipro, Accenture, Cognizant, Capgemini, Deloitte, EY, Genpact
- Indian college education: B.Tech CSE, BCA, BSc CS, MCA, MBA, M.Tech, MSc Data Science, MSc Cyber Security
- Top Indian universities: IITs, NITs, BITS Pilani, VIT, SRM, Manipal, Anna University, IIMs, XLRI
- Certifications: AWS, Azure, Google, IBM, Meta, CompTIA, Cisco, Oracle, ISTQB, SAP
- Resume building, ATS optimization, project ideas, internship strategies

Keep responses friendly, structured and actionable. Use bullet points and short sections. Always give practical next steps. When answering about roadmaps, give specific weekly/monthly milestones. When asked about companies, mention their specific interview rounds and what to prepare. Respond in 150-300 words for most questions. For complex roadmaps, up to 400 words is fine. Always end with an encouraging line.`;

async function sendChat(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();
  if(!msg)return;
  input.value='';
  addMessage(msg,'user');
  chatHistory.push({role:'user',content:msg});
  showTyping();
  document.getElementById('chat-send').disabled=true;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:SYSTEM_PROMPT,
        messages:chatHistory
      })
    });
    const data=await res.json();
    hideTyping();
    const reply=data.content&&data.content[0]&&data.content[0].text?data.content[0].text:"I'm here to help! Could you rephrase your question?";
    chatHistory.push({role:'assistant',content:reply});
    addMessage(reply,'bot');
  }catch(err){
    hideTyping();
    addMessage("Sorry, I'm having a moment. Please try again!","bot");
  }
  document.getElementById('chat-send').disabled=false;
}

function quickAsk(q){
  document.getElementById('chat-input').value=q;
  document.getElementById('ai-chat-section').scrollIntoView({behavior:'smooth'});
  setTimeout(sendChat,300);
}

function addMessage(text,role){
  const box=document.getElementById('chat-messages');
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  // Convert markdown-like to HTML
  let html=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
               .replace(/•/g,'•')
               .replace(/\n\n/g,'<br><br>')
               .replace(/\n/g,'<br>');
  div.innerHTML=html;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

let typingEl=null;
function showTyping(){
  const box=document.getElementById('chat-messages');
  typingEl=document.createElement('div');
  typingEl.className='msg bot chat-typing';
  typingEl.innerHTML='<span></span><span></span><span></span>';
  box.appendChild(typingEl);box.scrollTop=box.scrollHeight;
}
function hideTyping(){if(typingEl){typingEl.remove();typingEl=null;}}

/* ===================== CHARTS ===================== */
let sChart,rChart;
function initCharts(){
  const sc=document.getElementById('skillChart');
  const rc=document.getElementById('readinessChart');
  if(sChart)sChart.destroy();if(rChart)rChart.destroy();
  if(sc)sChart=new Chart(sc,{type:'bar',data:{labels:['AI','Cloud','Full Stack','Data Science','Security','DevOps'],datasets:[{label:'Hours logged',data:[38,52,64,30,18,12],backgroundColor:'#1A47CC',borderRadius:8,borderSkipped:false}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#f3f4f6'}}}}});
  if(rc)rChart=new Chart(rc,{type:'doughnut',data:{labels:['Resume Ready','Interview Ready','Projects Ready','Still Building'],datasets:[{data:[82,75,60,40],backgroundColor:['#00C27C','#F5C400','#1A47CC','#e8eaf6'],hoverOffset:6}]},options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11},padding:12}}}}});
}

/* ===================== AUTH ===================== */
let registeredUsers={};
function switchTab(t){
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-register').classList.toggle('active',t==='register');
  document.getElementById('form-login').classList.toggle('active',t==='login');
  document.getElementById('form-register').classList.toggle('active',t==='register');
  document.getElementById('login-error').style.display='none';
  document.getElementById('register-error').style.display='none';
}
function handleRegister(){
  const name=document.getElementById('register-name').value.trim();
  const email=document.getElementById('register-email').value.trim();
  const pw=document.getElementById('register-password').value;
  const err=document.getElementById('register-error');
  if(!name||!email||!pw){err.textContent="Please fill in all fields.";err.style.display='block';return;}
  if(pw.length<6){err.textContent="Password must be at least 6 characters.";err.style.display='block';return;}
  registeredUsers[email.toLowerCase()]={name,pw};
  err.style.display='none';unlockApp(name);
}
function handleLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pw=document.getElementById('login-password').value;
  const err=document.getElementById('login-error');
  const user=registeredUsers[email];
  if(!user){err.textContent="No account found. Please register first.";err.style.display='block';return;}
  if(user.pw!==pw){err.textContent="Incorrect password. Please try again.";err.style.display='block';return;}
  err.style.display='none';unlockApp(user.name);
}
function unlockApp(name){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').classList.add('unlocked');
  document.getElementById('nav-username').textContent=name||'Student';
  document.getElementById('nav-avatar').textContent=(name||'S').charAt(0).toUpperCase();
  window.scrollTo(0,0);
  setTimeout(initInteractive,60);
}
function handleLogout(){
  document.getElementById('app').classList.remove('unlocked');
  document.getElementById('gate').style.display='flex';
  document.getElementById('login-email').value='';
  document.getElementById('login-password').value='';
  chatHistory=[];
  document.getElementById('chat-messages').innerHTML=`<div class="msg bot">👋 Hi! I'm your <strong>NextGen AI Counselor</strong>. I can help you with:<br><br>• Career roadmaps & guidance<br>• Technology learning paths<br>• Project ideas for your portfolio<br>• College & course selection<br>• Company interview prep<br>• Certifications worth doing<br><br>What would you like to explore today?</div>`;
  switchTab('login');
}
</script>
