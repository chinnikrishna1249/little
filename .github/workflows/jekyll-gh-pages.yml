  renderCards('company-cards',companyData,'company',d=>({title:d.name,desc:`${d.rounds.length} rounds · ${d.salary} · Click for full round breakdown`,hint:"View all rounds & marks"}));
  renderCards('ug-cards',ugData,'ugcourse',d=>({title:d.name,desc:`${d.duration} · ${d.type}. ${d.desc.substring(0,90)}...`,tags:[d.duration,d.type],hint:"View courses & careers"}));
  renderCards('pg-cards',pgData,'pgcourse',d=>({title:d.name,desc:`${d.duration} · ${d.type}. ${d.desc.substring(0,90)}...`,tags:[d.duration,d.type],hint:"View details & exams"}));
  renderSimpleCards('ug-colleges',ugColleges);
  renderSimpleCards('pg-colleges',pgColleges);
  initCharts();
}

/* ===================== MODAL ===================== */
function cardClick(e,type,i){spawnRipple(e);openModal(type,i);}

function spawnRipple(e){
  const c=e.currentTarget;const r=document.createElement('span');r.className='ripple';
  const rect=c.getBoundingClientRect();const size=Math.max(rect.width,rect.height);
  r.style.width=r.style.height=size+'px';
  r.style.left=(e.clientX-rect.left-size/2)+'px';r.style.top=(e.clientY-rect.top-size/2)+'px';
  c.appendChild(r);setTimeout(()=>r.remove(),600);
}
