<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextGen Career Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#0D0D0D;
  --ink2:#2E2E2E;
  --blue:#1A47CC;
  --blue-light:#EEF2FF;
  --blue-mid:#3b5fe0;
  --gold:#F5C400;
  --green:#00C27C;
  --red:#E03E3E;
  --bg:#F5F6FA;
  --white:#FFFFFF;
  --border:#E4E6EF;
  --muted:#6B7280;
  --radius:18px;
  --shadow:0 4px 24px rgba(26,71,204,0.08);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;overflow-x:hidden;}
.container{width:92%;max-width:1280px;margin:auto;}

/* ===== GATE ===== */
#gate{position:fixed;inset:0;z-index:5000;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0D0D2B 0%,#0a1a5c 40%,#0D0D2B 100%);}
#gate::before{content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(26,71,204,0.4) 0%,transparent 60%),
              radial-gradient(ellipse at 80% 20%,rgba(245,196,0,0.15) 0%,transparent 50%);
  pointer-events:none;}
#gate-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:48px 48px;}
.gate-card{position:relative;z-index:10;background:#fff;width:92%;max-width:420px;
  border-radius:28px;padding:44px 38px 38px;box-shadow:0 40px 100px rgba(0,0,0,0.6);
  animation:riseIn .6s cubic-bezier(.16,1,.3,1);}
@keyframes riseIn{from{opacity:0;transform:translateY(32px) scale(.96);}to{opacity:1;transform:none;}}
.gate-logo{display:flex;align-items:center;gap:12px;margin-bottom:30px;justify-content:center;}
.gate-logo-box{width:48px;height:48px;background:var(--ink);color:var(--gold);display:flex;align-items:center;
  justify-content:center;border-radius:14px;font-size:24px;font-weight:900;font-family:'Space Grotesk',sans-serif;}
.gate-logo-text h2{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;}
.gate-logo-text p{font-size:10px;letter-spacing:2.5px;color:#999;text-transform:uppercase;}
.gate-tabs{display:flex;background:#f3f4f6;border-radius:14px;padding:4px;margin-bottom:28px;}
.gate-tab{flex:1;text-align:center;padding:11px 0;border-radius:11px;font-weight:600;font-size:14px;cursor:pointer;color:#888;transition:.25s;}
.gate-tab.active{background:var(--ink);color:#fff;}
.gate-title{font-size:26px;font-weight:800;margin-bottom:6px;font-family:'Space Grotesk',sans-serif;}
.gate-sub{font-size:13px;color:#888;margin-bottom:24px;line-height:1.6;}
.gate-field{margin-bottom:14px;}
.gate-field label{display:block;font-size:11.5px;font-weight:700;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.gate-field input{width:100%;padding:13px 16px;border:1.5px solid #E4E6EF;border-radius:12px;font-size:14px;
  outline:none;transition:.2s;font-family:'Inter',sans-serif;background:#FAFBFD;}
.gate-field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,71,204,0.1);}
.gate-error{display:none;background:#FEF2F2;color:#B91C1C;font-size:12.5px;padding:10px 14px;border-radius:10px;margin-bottom:14px;font-weight:500;}
.gate-submit{width:100%;padding:15px 0;border:none;border-radius:13px;background:var(--blue);color:#fff;
  font-weight:700;font-size:15px;cursor:pointer;margin-top:8px;transition:.2s;font-family:'Inter',sans-serif;}
.gate-submit:hover{background:#1238a8;}
.gate-foot{text-align:center;font-size:12.5px;color:#999;margin-top:18px;}
.gate-foot span{color:var(--blue);font-weight:600;cursor:pointer;}
.gate-form{display:none;}
.gate-form.active{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ===== APP ===== */
#app{display:none;}
#app.unlocked{display:block;animation:appReveal .6s ease;}
@keyframes appReveal{from{opacity:0;}to{opacity:1;}}

/* ===== NAV ===== */
nav{position:fixed;top:0;left:0;width:100%;background:rgba(255,255,255,0.95);
  backdrop-filter:blur(14px);border-bottom:1px solid var(--border);z-index:1000;}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:16px 0;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-box{width:46px;height:46px;background:var(--ink);color:var(--gold);display:flex;align-items:center;
  justify-content:center;border-radius:13px;font-size:22px;font-weight:900;font-family:'Space Grotesk',sans-serif;}
.logo-text h2{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;}
.logo-text p{font-size:10px;letter-spacing:2px;color:#999;text-transform:uppercase;}
nav ul{display:flex;list-style:none;gap:22px;}
nav ul li a{text-decoration:none;color:var(--ink2);font-weight:500;font-size:14px;transition:.2s;}
nav ul li a:hover{color:var(--blue);}
.nav-right{display:flex;align-items:center;gap:14px;}
.user-chip{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:#444;}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--blue);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.logout-btn{background:var(--ink);color:#fff;padding:9px 18px;border-radius:11px;font-size:13px;font-weight:600;border:none;cursor:pointer;}

/* ===== HERO ===== */
.hero{padding-top:160px;padding-bottom:100px;
  background:linear-gradient(160deg,#f0f3ff 0%,#fff8e0 50%,#f0f7ff 100%);
  position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;top:-60px;right:-120px;width:600px;height:600px;
  border-radius:50%;background:radial-gradient(circle,rgba(26,71,204,0.08),transparent 70%);}
.hero::after{content:"";position:absolute;bottom:-80px;left:-100px;width:500px;height:500px;
  border-radius:50%;background:radial-gradient(circle,rgba(245,196,0,0.1),transparent 70%);}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--gold);
  padding:10px 20px;border-radius:50px;font-weight:700;margin-bottom:28px;font-size:13px;}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:72px;font-weight:800;line-height:1.05;}
.hero h1 span{color:var(--blue);}
.hero p{max-width:840px;font-size:18px;line-height:1.85;color:var(--muted);margin-top:24px;}
.hero-btns{margin-top:36px;display:flex;gap:16px;flex-wrap:wrap;}
.btn-primary{background:var(--blue);color:#fff;padding:16px 28px;border-radius:14px;
  text-decoration:none;font-weight:700;font-size:14.5px;display:inline-block;border:none;cursor:pointer;transition:.2s;}
.btn-primary:hover{background:#1238a8;}
.btn-outline{border:2px solid var(--ink);padding:16px 28px;border-radius:14px;
  text-decoration:none;color:var(--ink);font-weight:700;font-size:14.5px;transition:.2s;}
.btn-outline:hover{background:var(--ink);color:#fff;}
.hero-stats{display:flex;gap:40px;margin-top:48px;flex-wrap:wrap;}
.hero-stat h3{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:800;color:var(--blue);}
.hero-stat p{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}

/* ===== SECTIONS ===== */
.section{padding:88px 0;}
.section-alt{background:var(--white);}
.eyebrow{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:14px;}
.eyebrow-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);}
.eyebrow-line{width:32px;height:2px;background:var(--gold);}
.eyebrow-text{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--blue);text-transform:uppercase;}
.section-title{text-align:center;font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:800;margin-bottom:14px;}
.section-sub{text-align:center;max-width:720px;margin:0 auto 52px;color:var(--muted);font-size:16px;line-height:1.7;}

/* ===== CARDS ===== */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px;}
.card{background:#fff;padding:30px;border-radius:var(--radius);box-shadow:var(--shadow);
  border:1px solid var(--border);transition:.3s;}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(26,71,204,0.12);}
.card-icon{width:48px;height:48px;border-radius:14px;background:var(--blue-light);color:var(--blue);
  display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px;}
.card h3{font-family:'Space Grotesk',sans-serif;margin-bottom:10px;font-size:17px;font-weight:700;}
.card p{font-size:13.5px;color:var(--muted);line-height:1.65;}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;}
.card-tags span{font-size:11px;background:var(--bg);color:#555;padding:4px 11px;border-radius:50px;font-weight:600;}
.card.clickable{cursor:pointer;position:relative;overflow:hidden;}
.card.clickable:active{transform:translateY(-2px) scale(.98);}
.click-hint{margin-top:14px;font-size:12px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:6px;}
.click-hint::after{content:"→";transition:transform .2s;}
.card.clickable:hover .click-hint::after{transform:translateX(4px);}
.ripple{position:absolute;border-radius:50%;background:rgba(26,71,204,0.18);transform:scale(0);
  animation:rippleAnim .55s ease-out;pointer-events:none;}
@keyframes rippleAnim{to{transform:scale(3.5);opacity:0;}}

/* ===== PROGRESS ===== */
.progress-card{background:#fff;padding:28px;border-radius:var(--radius);border:1px solid var(--border);}
.progress-card h3{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:14px;}
.progress-track{width:100%;height:10px;background:#eef0f4;border-radius:50px;overflow:hidden;}
.progress-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--blue),var(--blue-mid));}
.progress-label{display:flex;justify-content:space-between;margin-top:10px;font-size:12.5px;color:#888;font-weight:600;}

/* ===== PRICING ===== */
.pricing-section{background:var(--ink);color:#fff;}
.pricing-section .section-title,.pricing-section .section-sub{color:#ddd;}
.pricing-section .eyebrow-text{color:#9fb1f5;}
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;}
.price-card{background:#181828;border:1.5px solid #2a2a3e;border-radius:24px;padding:36px 30px;position:relative;transition:.3s;}
.price-card:hover{transform:translateY(-8px);border-color:var(--blue-mid);}
.price-card.featured{background:linear-gradient(160deg,#1A47CC,#0a2a85);border-color:var(--blue-mid);}
.price-badge{position:absolute;top:-14px;right:26px;background:var(--gold);color:var(--ink);
  font-size:11px;font-weight:800;padding:5px 14px;border-radius:50px;}
.price-plan{font-size:12px;font-weight:700;letter-spacing:1.5px;color:#9fb1f5;text-transform:uppercase;margin-bottom:12px;}
.price-card.featured .price-plan{color:var(--gold);}
.price-amount{font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:800;margin-bottom:4px;}
.price-amount span{font-size:15px;font-weight:400;color:#888;}
.price-card.featured .price-amount span{color:#cfd8f5;}
.price-desc{font-size:13px;color:#888;margin-bottom:22px;line-height:1.6;}
.price-card.featured .price-desc{color:#cfd8f5;}
.price-features{list-style:none;margin-bottom:26px;}
.price-features li{font-size:13.5px;padding:9px 0;border-bottom:1px solid #232333;display:flex;gap:10px;color:#ddd;align-items:flex-start;}
.price-card.featured .price-features li{border-bottom:1px solid rgba(255,255,255,0.12);color:#fff;}
.price-features li::before{content:"✓";color:var(--green);font-weight:800;flex-shrink:0;}
.price-btn{display:block;text-align:center;width:100%;padding:14px 0;border-radius:12px;font-weight:700;font-size:14px;text-decoration:none;cursor:pointer;border:none;}
.price-btn.outline{background:transparent;border:1.5px solid #444;color:#fff;}
.price-btn.solid{background:var(--gold);color:var(--ink);}

/* ===== AI CHAT ===== */
#ai-chat-section{background:linear-gradient(160deg,#0D0D2B,#0a1a5c);}
#ai-chat-section .section-title{color:#fff;}
#ai-chat-section .section-sub{color:#9fb1f5;}
.chat-wrapper{max-width:860px;margin:0 auto;}
.chat-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;overflow:hidden;backdrop-filter:blur(10px);}
.chat-header{background:rgba(26,71,204,0.8);padding:18px 24px;display:flex;align-items:center;gap:12px;}
.chat-header-avatar{width:40px;height:40px;border-radius:50%;background:var(--gold);color:var(--ink);
  display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;}
.chat-header-info h4{color:#fff;font-size:15px;font-weight:700;font-family:'Space Grotesk',sans-serif;}
.chat-header-info p{color:#cfd8f5;font-size:12px;}
.chat-status{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:auto;}
.chat-messages{height:420px;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}
.msg{max-width:80%;padding:14px 18px;border-radius:18px;font-size:14px;line-height:1.65;animation:msgIn .3s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.msg.bot{background:rgba(255,255,255,0.1);color:#e8ecff;border-bottom-left-radius:4px;align-self:flex-start;}
.msg.user{background:var(--blue);color:#fff;border-bottom-right-radius:4px;align-self:flex-end;}
.msg.bot strong{color:var(--gold);}
.msg.bot ul{padding-left:18px;margin-top:6px;}
.msg.bot li{margin-bottom:4px;}
.chat-typing{display:flex;gap:4px;padding:12px 18px;align-self:flex-start;}
.chat-typing span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.4);animation:bounce 1.2s infinite;}
.chat-typing span:nth-child(2){animation-delay:.2s;}
.chat-typing span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-8px);}}
.chat-quick-btns{padding:12px 24px 0;display:flex;flex-wrap:wrap;gap:8px;}
.chat-quick-btn{background:rgba(255,255,255,0.08);color:#cfd8f5;border:1px solid rgba(255,255,255,0.15);
  padding:7px 14px;border-radius:50px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif;}
.chat-quick-btn:hover{background:rgba(26,71,204,0.5);border-color:var(--blue-mid);color:#fff;}
.chat-input-row{padding:16px 20px;display:flex;gap:10px;border-top:1px solid rgba(255,255,255,0.08);}
.chat-input{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  border-radius:12px;padding:13px 16px;color:#fff;font-size:14px;outline:none;font-family:'Inter',sans-serif;}
.chat-input::placeholder{color:rgba(255,255,255,0.35);}
.chat-input:focus{border-color:var(--blue-mid);background:rgba(255,255,255,0.12);}
.chat-send-btn{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:13px 20px;
  cursor:pointer;font-weight:700;font-size:14px;transition:.2s;font-family:'Inter',sans-serif;}
.chat-send-btn:hover{background:#1238a8;}
.chat-send-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* ===== MODAL ===== */
#modal-overlay{position:fixed;inset:0;background:rgba(10,10,10,0.65);backdrop-filter:blur(4px);
  z-index:6000;display:none;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
#modal-box{background:#fff;border-radius:28px;max-width:720px;width:100%;max-height:88vh;overflow-y:auto;
  padding:40px 38px;position:relative;box-shadow:0 40px 100px rgba(0,0,0,0.45);
  animation:riseIn .35s cubic-bezier(.16,1,.3,1);}
#modal-box::-webkit-scrollbar{width:5px;}
#modal-box::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:5px;}
#modal-close{position:absolute;top:18px;right:18px;width:36px;height:36px;border-radius:50%;
  border:none;background:#f3f4f6;font-size:15px;cursor:pointer;font-weight:700;color:#555;transition:.2s;}
#modal-close:hover{background:#e5e7eb;}
.modal-eyebrow{font-size:11.5px;font-weight:800;letter-spacing:2px;color:var(--blue);text-transform:uppercase;margin-bottom:8px;}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:800;margin-bottom:6px;}
.modal-sub{color:var(--muted);font-size:14px;margin-bottom:24px;line-height:1.65;}
.modal-block{margin-bottom:22px;}
.modal-block h4{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--ink);display:flex;align-items:center;gap:8px;}
.modal-steps{list-style:none;counter-reset:step;}
.modal-steps li{counter-increment:step;padding:12px 0 12px 40px;position:relative;
  border-bottom:1px solid #f2f3f5;font-size:13.5px;color:#444;line-height:1.6;}
.modal-steps li:last-child{border-bottom:none;}
.modal-steps li::before{content:counter(step);position:absolute;left:0;top:10px;width:26px;height:26px;
  border-radius:50%;background:var(--blue);color:#fff;font-size:11.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;}
.modal-pills{display:flex;flex-wrap:wrap;gap:8px;}
.modal-pills span{background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:700;padding:6px 14px;border-radius:50px;}
.modal-pills span.gold{background:#FFF8DB;color:#7a5d00;}
.modal-pills span.green{background:#E6FAF3;color:#016B48;}
.modal-pills span.red{background:#FEF2F2;color:#991B1B;}
.modal-cta{margin-top:8px;display:block;text-align:center;background:var(--blue);color:#fff;
  padding:14px 0;border-radius:13px;font-weight:700;font-size:14px;border:none;cursor:pointer;width:100%;font-family:'Inter',sans-serif;}
.round-card{background:var(--bg);border-radius:14px;padding:18px;margin-bottom:12px;border:1px solid var(--border);}
.round-card h5{font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.round-card p{font-size:13px;color:var(--muted);line-height:1.6;}
.round-badge{background:var(--blue);color:#fff;font-size:10.5px;font-weight:700;
  padding:3px 10px;border-radius:50px;letter-spacing:.5px;}
.round-badge.pass{background:var(--green);}
.round-badge.warn{background:var(--gold);color:var(--ink);}
.college-type-tabs{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.ctype-btn{padding:8px 18px;border-radius:50px;border:2px solid var(--border);background:#fff;
  font-size:13px;font-weight:700;cursor:pointer;transition:.2s;color:var(--ink2);}
.ctype-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}

/* ===== TEAM / FOOTER ===== */
footer{background:#111;color:#fff;padding:60px 20px;text-align:center;}
footer h2{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;}
footer p{margin-top:10px;color:#888;}

@media(max-width:768px){
  .hero h1{font-size:40px;}
  nav ul{display:none;}
  #modal-box{padding:28px 20px;}
  .hero-stats{gap:24px;}
}
</style>
</head>
<body>

<!-- ===== GATE ===== -->
<div id="gate">
  <div id="gate-grid"></div>
  <div class="gate-card">
    <div class="gate-logo">
      <div class="gate-logo-box">N</div>
      <div class="gate-logo-text"><h2>NextGen</h2><p>Career Hub</p></div>
    </div>
    <div class="gate-tabs">
      <div class="gate-tab active" id="tab-login" onclick="switchTab('login')">Log In</div>
      <div class="gate-tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>
    <!-- LOGIN -->
    <div class="gate-form active" id="form-login">
      <div class="gate-title">Welcome back 👋</div>
      <div class="gate-sub">Log in to access your dashboard, roadmaps and AI counselor.</div>
      <div class="gate-error" id="login-error">No account found. Please register first.</div>
      <div class="gate-field"><label>Email Address</label><input type="email" id="login-email" placeholder="you@example.com"></div>
      <div class="gate-field"><label>Password</label><input type="password" id="login-password" placeholder="Your password"></div>
      <button class="gate-submit" onclick="handleLogin()">Log In →</button>
      <div class="gate-foot">New here? <span onclick="switchTab('register')">Create an account</span></div>
    </div>
    <!-- REGISTER -->
    <div class="gate-form" id="form-register">
      <div class="gate-title">Join NextGen 🚀</div>
      <div class="gate-sub">Create your free account and start your career journey today.</div>
      <div class="gate-error" id="register-error">Please fill all fields.</div>
